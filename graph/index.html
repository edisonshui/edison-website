<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graph — Edison</title>
<meta name="description" content="My life, as a network.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F2EB; --paper: #EAE6DC; --parchment: #D6D1C4;
    --stone: #B8AC9A; --warm-black: #1C1A14;
    --sage: #7A8B6F; --sage-light: #C8D4B8; --sage-dark: #4A5E3A;
    --graph-bg: #0F0E0B; --graph-surface: #141410; --graph-border: #2A2A20;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-ui: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: var(--graph-bg); color: var(--cream); font-family: var(--font-ui); -webkit-font-smoothing: antialiased; }

  /* NAV — dark variant */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; height: 56px; padding: 0 48px;
    display: flex; align-items: center; justify-content: space-between; z-index: 200;
    background: transparent;
  }
  .nav-brand { font-family: var(--font-display); font-size: 18px; font-weight: 400; letter-spacing: 0.08em; color: var(--paper); }
  .nav-links { display: flex; gap: 28px; }
  .nav-link { font-size: 11px; color: #4A4A3A; letter-spacing: 0.02em; padding: 4px 0; transition: color 200ms ease; }
  .nav-link.active { color: var(--sage); }
  .nav-link:hover { color: #6A6A5A; }

  /* FULL CANVAS */
  #graph-canvas { position: fixed; inset: 0; }

  /* INTRO OVERLAY */
  #intro-overlay {
    position: fixed; inset: 0; z-index: 400;
    background: var(--graph-bg);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; pointer-events: all;
  }
  #intro-overlay.exiting {
    animation: intro-exit 800ms cubic-bezier(.4,0,.2,1) forwards;
  }
  #intro-overlay.done { display: none; pointer-events: none; }

  /* Grain texture via SVG filter */
  #intro-overlay::before {
    content: ''; position: absolute; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
    background-size: 256px 256px; pointer-events: none;
  }

  /* Horizontal scan line */
  .intro-scan {
    position: absolute; top: -1px; left: 0; right: 0; height: 1px; z-index: 3;
    background: linear-gradient(90deg, transparent 0%, var(--sage-dark) 20%, var(--sage) 50%, var(--sage-dark) 80%, transparent 100%);
    opacity: 0;
    animation: scan-sweep 1000ms cubic-bezier(.4,0,.6,1) 200ms forwards;
  }
  @keyframes scan-sweep {
    0%   { transform: translateY(0vh);   opacity: 0; }
    5%   { opacity: 0.9; }
    95%  { opacity: 0.6; }
    100% { transform: translateY(100vh); opacity: 0; }
  }

  /* Center content */
  .intro-content {
    position: relative; z-index: 2; text-align: center;
    display: flex; flex-direction: column; align-items: center;
  }
  .intro-eyebrow {
    font-family: var(--font-mono); font-size: 10px; color: var(--sage);
    letter-spacing: 0.35em; text-transform: uppercase; margin-bottom: 20px;
    opacity: 0; animation: fade-up 500ms ease 500ms forwards;
  }
  .intro-title {
    font-family: var(--font-display); font-size: clamp(44px, 7vw, 88px);
    font-weight: 300; color: var(--cream); line-height: 1.08;
    letter-spacing: -0.025em;
    opacity: 0; animation: fade-up 700ms ease 650ms forwards;
  }
  .intro-title em { font-style: italic; color: var(--sage-light); }
  .intro-divider {
    width: 48px; height: 0.5px; background: var(--sage-dark);
    margin: 28px auto 0;
    opacity: 0; animation: fade-in 400ms ease 900ms forwards;
    transform-origin: center;
    animation-name: scale-in-h;
  }
  @keyframes scale-in-h {
    from { opacity: 0; transform: scaleX(0); }
    to   { opacity: 1; transform: scaleX(1); }
  }
  .intro-meta {
    font-family: var(--font-mono); font-size: 10px; color: #3A4A30;
    margin-top: 16px; letter-spacing: 0.2em;
    opacity: 0; animation: fade-up 400ms ease 1000ms forwards;
  }
  .intro-sep { margin: 0 14px; color: #2A3A22; }

  /* Corner labels */
  .intro-corner {
    position: absolute; font-family: var(--font-mono); font-size: 9px;
    color: #222218; letter-spacing: 0.12em;
    opacity: 0; animation: fade-in 500ms ease 700ms forwards;
  }
  .intro-corner.tl { top: 36px; left: 48px; }
  .intro-corner.tr { top: 36px; right: 48px; text-align: right; }
  .intro-corner.bl { bottom: 36px; left: 48px; }
  .intro-corner.br { bottom: 36px; right: 48px; text-align: right; }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-in {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes intro-exit {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }

  /* FILTER TRIGGER */
  .filter-panel { position: fixed; bottom: 32px; left: 48px; z-index: 100; }
  .filter-trigger {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em;
    padding: 8px 14px; background: rgba(15,14,11,0.88);
    border: 0.5px solid #252520; border-radius: 2px; cursor: pointer;
    color: #4A4A3A; backdrop-filter: blur(8px); user-select: none;
    transition: color 150ms ease, border-color 150ms ease, background 150ms ease;
  }
  .filter-trigger:hover { color: #6A6A5A; border-color: #3A3A2A; }
  .filter-trigger.has-filter { color: var(--sage); border-color: var(--sage); background: rgba(42,58,34,0.6); }
  .ft-label { }
  .ft-clear { color: #3A5A30; font-size: 11px; line-height: 1; transition: color 120ms ease; }
  .ft-clear:hover { color: var(--sage-light); }
  .ft-sep { color: #252520; }
  .ft-arrow { color: #2A2A1C; font-size: 9px; transition: transform 280ms cubic-bezier(0.4,0,0.2,1); }
  .filter-trigger.open .ft-arrow { transform: rotate(180deg); }

  /* TAG SHEET */
  .tag-sheet { position: fixed; inset: 0; z-index: 150; pointer-events: none; }
  .tag-sheet.open { pointer-events: all; }
  .tag-sheet-backdrop {
    position: absolute; inset: 0;
    background: rgba(8,8,6,0); backdrop-filter: blur(0px);
    transition: background 250ms ease, backdrop-filter 250ms ease;
  }
  .tag-sheet.open .tag-sheet-backdrop { background: rgba(8,8,6,0.65); backdrop-filter: blur(8px); }
  .tag-sheet-panel {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(14,13,10,0.98); border-top: 0.5px solid #232318;
    padding: 24px 48px 52px;
    transform: translateY(100%);
    transition: transform 320ms cubic-bezier(0.4,0,0.2,1);
  }
  .tag-sheet.open .tag-sheet-panel { transform: translateY(0); }
  .tag-sheet-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
  }
  .tag-sheet-title { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: #2A2A1C; }
  .tag-sheet-close {
    font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.06em;
    color: #3A3A2A; background: none; border: none; cursor: pointer;
    transition: color 150ms ease;
  }
  .tag-sheet-close:hover { color: var(--sage); }
  .tag-sheet-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .stag {
    font-family: var(--font-mono); font-size: 10px; color: #5A5A4A;
    padding: 6px 14px; border: 0.5px solid #2A2A1C; border-radius: 2px; cursor: pointer;
    background: rgba(20,20,14,0.5); display: inline-flex; align-items: center; gap: 8px;
    transition: color 150ms ease, border-color 150ms ease, background 150ms ease;
    user-select: none;
  }
  .stag:hover { color: var(--sage-light); border-color: var(--sage-dark); }
  .stag.active { color: var(--sage); border-color: var(--sage); background: rgba(42,58,34,0.5); }
  .stag.all-stag.active { color: var(--sage-light); }
  .stag-count { font-family: var(--font-mono); font-size: 8px; color: #2A3824; }
  .stag.active .stag-count { color: var(--sage-dark); }

  /* NODE TOOLTIP */
  .node-tooltip {
    position: fixed; z-index: 100; pointer-events: none;
    background: rgba(15,14,11,0.92); border: 0.5px solid var(--graph-border);
    border-radius: 6px; padding: 10px 14px; backdrop-filter: blur(12px);
    opacity: 0; transform: translateY(4px);
    transition: opacity 150ms ease, transform 150ms ease;
    max-width: 200px;
  }
  .node-tooltip.visible { opacity: 1; transform: translateY(0); }
  .tooltip-label { font-family: var(--font-mono); font-size: 10px; color: var(--sage-light); margin-bottom: 4px; }
  .tooltip-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .tooltip-tag { font-family: var(--font-mono); font-size: 9px; color: #5A6A50; padding: 2px 7px; border: 0.5px solid #2E3D28; border-radius: 2px; }

  /* INSTRUCTIONS */
  .instructions {
    position: fixed; bottom: 32px; right: 48px; z-index: 100;
    font-family: var(--font-mono); font-size: 9px; color: #2E2E20;
    line-height: 1.8; text-align: right;
  }

  /* PHOTO MODAL */
  .photo-modal {
    position: fixed; inset: 0; z-index: 300; display: flex; align-items: center; justify-content: center;
    background: rgba(10,10,8,0.88); backdrop-filter: blur(16px);
    opacity: 0; pointer-events: none; transition: opacity 250ms ease;
  }
  .photo-modal.visible { opacity: 1; pointer-events: all; }
  .modal-inner { background: var(--graph-surface); border: 0.5px solid var(--graph-border); border-radius: 14px; overflow: hidden; max-width: 720px; width: calc(100% - 48px); }
  .modal-img { width: 100%; max-height: 65vh; object-fit: cover; display: block; background: #1A2416; }
  .modal-body { padding: 20px 24px 24px; }
  .modal-date { font-family: var(--font-mono); font-size: 9px; color: #3A4A30; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
  .modal-label { font-family: var(--font-mono); font-size: 11px; color: var(--sage); margin-bottom: 8px; }
  .modal-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .modal-tag { font-family: var(--font-mono); font-size: 9px; color: #5A6A50; padding: 3px 9px; border: 0.5px solid #2E3D28; border-radius: 2px; }
  .modal-close { font-family: var(--font-mono); font-size: 10px; color: #3A3A2A; cursor: pointer; float: right; transition: color 150ms ease; }
  .modal-close:hover { color: var(--sage); }

  /* EMPTY STATE */
  #empty-state {
    position: fixed; inset: 0; z-index: 50;
    display: none; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
    font-family: var(--font-mono); font-size: 11px; color: #3A3A2A; text-align: center;
  }
  #empty-state.visible { display: flex; }
  #empty-state a { color: var(--sage); border-bottom: 0.5px solid var(--sage-dark); padding-bottom: 1px; }

  @media (max-width: 700px) {
    .nav { padding: 0 24px; }
    .filter-panel { left: 24px; bottom: 24px; }
    .tag-sheet-panel { padding: 20px 24px 44px; }
    .instructions { display: none; }
  }
</style>
</head>
<body>

<div id="intro-overlay">
  <div class="intro-scan"></div>
  <div class="intro-content">
    <div class="intro-eyebrow">05 — graph</div>
    <div class="intro-title">My life,<br><em>as a network.</em></div>
    <div class="intro-divider"></div>
    <div class="intro-meta">
      <span id="intro-nodes">nodes: —</span>
      <span class="intro-sep">·</span>
      <span id="intro-edges">edges: <span id="intro-edge-count">—</span></span>
    </div>
  </div>
  <div class="intro-corner tl">graph / force-directed</div>
  <div class="intro-corner tr">drag · zoom · explore</div>
  <div class="intro-corner bl">overlake, 2025</div>
  <div class="intro-corner br">edison hui</div>
</div>

<svg id="graph-canvas"></svg>

<div id="empty-state">
  <span>no photos yet.</span>
  <span><a href="/admin">upload one →</a></span>
</div>

<nav class="nav">
  <a href="/" class="nav-brand">EDISON</a>
  <div class="nav-links">
    <a href="/writing" class="nav-link">writing</a>
    <a href="/projects" class="nav-link">projects</a>
    <a href="/playground" class="nav-link">playground</a>
    <a href="/graph" class="nav-link active">graph</a>
    <a href="/about" class="nav-link">about</a>
  </div>
</nav>

<div class="filter-panel">
  <div class="filter-trigger" id="filter-trigger">
    <span class="ft-label">filter by tag</span>
    <span class="ft-sep">·</span>
    <span class="ft-arrow">↑</span>
  </div>
</div>

<div class="tag-sheet" id="tag-sheet">
  <div class="tag-sheet-backdrop" id="tag-sheet-backdrop"></div>
  <div class="tag-sheet-panel">
    <div class="tag-sheet-header">
      <span class="tag-sheet-title">filter by tag</span>
      <button class="tag-sheet-close" id="tag-sheet-close">close ×</button>
    </div>
    <div class="tag-sheet-tags" id="tag-sheet-tags"></div>
  </div>
</div>

<div class="node-tooltip" id="tooltip">
  <div class="tooltip-label" id="tooltip-label"></div>
  <div class="tooltip-tags" id="tooltip-tags"></div>
</div>

<div class="photo-modal" id="modal" onclick="closeModal(event)">
  <div class="modal-inner">
    <img class="modal-img" id="modal-img" src="" alt="">
    <div class="modal-body">
      <span class="modal-close" onclick="closeModal()">close ×</span>
      <div class="modal-date" id="modal-date"></div>
      <div class="modal-label" id="modal-label"></div>
      <div class="modal-tags" id="modal-tags"></div>
    </div>
  </div>
</div>

<div class="instructions">
  drag · scroll to zoom · click to open
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://gocoagynibdrqhalhtiz.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdvY29hZ3luaWJkcnFoYWxodGl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NTU4MjYsImV4cCI6MjA5NTAzMTgyNn0.-DoLtBAHK-tLZDs5yd4rJRN2_ptZCiSS28MJQ_J2vGU';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function buildEdges(nodes) {
  const links = [];
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const shared = nodes[i].tags.filter(t => nodes[j].tags.includes(t));
      if (shared.length) links.push({ source: nodes[i].id, target: nodes[j].id, strength: shared.length });
    }
  }
  return links;
}

// ─── MODAL (global so inline onclick handlers work) ──────────────────────────
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('visible');
  }
}

// ─── MAIN ────────────────────────────────────────────────────────────────────
async function initGraph() {
  const { data, error } = await sb.from('nodes').select('*').order('date', { ascending: false });

  if (error || !data?.length) {
    document.getElementById('intro-overlay').classList.add('done');
    document.getElementById('empty-state').classList.add('visible');
    return;
  }

  const photoNodes = data.map(n => ({
    ...n,
    r: Math.min(32, 12 + (n.tags?.length || 0) * 3),
  }));

  const links = buildEdges(photoNodes);
  const allTags = [...new Set(photoNodes.flatMap(n => n.tags || []))].sort();
  let activeTag = null;

  // Update intro counts
  document.getElementById('intro-nodes').textContent = `nodes: ${photoNodes.length}`;
  document.getElementById('intro-edge-count').textContent = links.length;

  // ─── TAG FILTER UI ─────────────────────────────────────────────────────────
  // Sort tags by frequency (most used first)
  const tagCounts = {};
  photoNodes.forEach(n => (n.tags || []).forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; }));
  const allTagsSorted = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]).map(([t]) => t);

  const sheetTags = document.getElementById('tag-sheet-tags');
  const allBtn = document.createElement('button');
  allBtn.className = 'stag all-stag active';
  allBtn.dataset.tag = '';
  allBtn.textContent = 'all';
  sheetTags.appendChild(allBtn);
  allTagsSorted.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'stag';
    btn.dataset.tag = tag;
    btn.innerHTML = `${tag}<span class="stag-count">${tagCounts[tag]}</span>`;
    sheetTags.appendChild(btn);
  });

  sheetTags.addEventListener('click', e => {
    const btn = e.target.closest('.stag');
    if (!btn) return;
    sheetTags.querySelectorAll('.stag').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTag = btn.dataset.tag || null;
    updateTrigger();
    closeTagSheet();
    applyFilter();
  });

  // Trigger
  const triggerEl = document.getElementById('filter-trigger');
  triggerEl.addEventListener('click', e => {
    if (e.target.classList.contains('ft-clear')) { clearTagFilter(); return; }
    toggleTagSheet();
  });
  document.getElementById('tag-sheet-backdrop').addEventListener('click', closeTagSheet);
  document.getElementById('tag-sheet-close').addEventListener('click', closeTagSheet);

  function toggleTagSheet() {
    const open = document.getElementById('tag-sheet').classList.toggle('open');
    triggerEl.classList.toggle('open', open);
  }
  function closeTagSheet() {
    document.getElementById('tag-sheet').classList.remove('open');
    triggerEl.classList.remove('open');
  }
  function clearTagFilter() {
    activeTag = null;
    sheetTags.querySelectorAll('.stag').forEach(b => b.classList.remove('active'));
    sheetTags.querySelector('.all-stag').classList.add('active');
    updateTrigger();
    applyFilter();
  }
  function updateTrigger() {
    if (activeTag) {
      triggerEl.innerHTML = `<span class="ft-label">${activeTag}</span><span class="ft-clear">×</span><span class="ft-sep">·</span><span class="ft-arrow">↑</span>`;
      triggerEl.classList.add('has-filter');
    } else {
      triggerEl.innerHTML = `<span class="ft-label">filter by tag</span><span class="ft-sep">·</span><span class="ft-arrow">↑</span>`;
      triggerEl.classList.remove('has-filter');
    }
    triggerEl.classList.remove('open');
  }

  // ─── SVG ───────────────────────────────────────────────────────────────────
  const W = window.innerWidth;
  const H = window.innerHeight;

  const svg = d3.select('#graph-canvas').attr('width', W).attr('height', H);
  const g = svg.append('g');

  svg.call(
    d3.zoom().scaleExtent([0.25, 5])
      .on('zoom', e => g.attr('transform', e.transform))
  );

  // ─── CLIP PATHS ────────────────────────────────────────────────────────────
  const defs = svg.append('defs');
  photoNodes.forEach(d => {
    defs.append('clipPath')
      .attr('id', `clip-${d.id}`)
      .attr('clipPathUnits', 'objectBoundingBox')
      .append('circle')
      .attr('cx', 0.5).attr('cy', 0.5).attr('r', 0.5);
  });

  // ─── SIMULATION ────────────────────────────────────────────────────────────
  const sim = d3.forceSimulation(photoNodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(d => 120 + (d.source.r + d.target.r) * 1.8).strength(0.25))
    .force('charge', d3.forceManyBody().strength(d => -d.r * 32))
    .force('center', d3.forceCenter(W / 2, H / 2).strength(0.04))
    .force('collision', d3.forceCollide().radius(d => d.r + 24))
    .alphaDecay(0.012)
    .velocityDecay(0.4);

  // ─── EDGES ─────────────────────────────────────────────────────────────────
  const link = g.append('g').selectAll('line')
    .data(links).join('line')
    .attr('stroke', '#7A8B6F')
    .attr('stroke-width', d => 0.6 + d.strength * 0.2)
    .attr('opacity', d => 0.2 + d.strength * 0.1);

  // ─── NODES ─────────────────────────────────────────────────────────────────
  const node = g.append('g').selectAll('g')
    .data(photoNodes).join('g')
    .style('cursor', 'pointer')
    .call(
      d3.drag()
        .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.15).restart(); d.fx = d.x; d.fy = d.y; })
        .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
        .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  // Dark fallback circle (visible while image loads)
  node.append('circle')
    .attr('r', d => d.r)
    .attr('fill', '#1A2416');

  // Photo image clipped to circle
  node.append('image')
    .attr('href', d => d.src_url)
    .attr('x', d => -d.r).attr('y', d => -d.r)
    .attr('width', d => d.r * 2).attr('height', d => d.r * 2)
    .attr('clip-path', d => `url(#clip-${d.id})`)
    .attr('preserveAspectRatio', 'xMidYMid slice');

  // Stroke ring
  node.append('circle')
    .attr('r', d => d.r)
    .attr('fill', 'none')
    .attr('stroke', '#7A8B6F')
    .attr('stroke-width', d => d.r > 20 ? 1.2 : 0.8);

  // Labels
  node.append('text')
    .text(d => d.title)
    .attr('y', d => d.r + 14)
    .attr('text-anchor', 'middle')
    .attr('font-family', "'JetBrains Mono', monospace")
    .attr('font-size', d => d.r > 20 ? 9 : 8)
    .attr('fill', '#6A7B5F')
    .attr('opacity', 0.7)
    .attr('pointer-events', 'none');

  // ─── FILTER ────────────────────────────────────────────────────────────────
  function applyFilter() {
    const vis = d => !activeTag || d.tags.includes(activeTag) ? 1 : 0.08;
    node.selectAll('circle').transition().duration(300).attr('opacity', vis);
    node.selectAll('image').transition().duration(300).attr('opacity', vis);
    node.selectAll('text').transition().duration(300)
      .attr('opacity', d => !activeTag || d.tags.includes(activeTag) ? 0.7 : 0.04);
    link.transition().duration(300).attr('opacity', d => {
      if (!activeTag) return null;
      return d.source.tags?.includes(activeTag) && d.target.tags?.includes(activeTag) ? 0.6 : 0.03;
    });
  }

  // ─── HOVER / CLICK ─────────────────────────────────────────────────────────
  const tooltip = document.getElementById('tooltip');
  const tooltipLabel = document.getElementById('tooltip-label');
  const tooltipTags = document.getElementById('tooltip-tags');

  node.on('mouseenter', (e, d) => {
    node.selectAll('circle').attr('opacity', n => n.id === d.id ? 1 : 0.25);
    node.selectAll('image').attr('opacity', n => n.id === d.id ? 1 : 0.25);
    link.attr('opacity', l => l.source.id === d.id || l.target.id === d.id ? 0.8 : 0.04);
    const newR = d.r * 1.25;
    d3.select(e.currentTarget).select('image')
      .transition().duration(200)
      .attr('x', -newR).attr('y', -newR)
      .attr('width', newR * 2).attr('height', newR * 2);
    d3.select(e.currentTarget).selectAll('circle')
      .transition().duration(200).attr('r', newR).attr('opacity', 1);

    tooltipLabel.textContent = d.title;
    tooltipTags.innerHTML = (d.tags || []).map(t => `<span class="tooltip-tag">${t}</span>`).join('');
    tooltip.classList.add('visible');
  })
  .on('mousemove', e => {
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY - 8) + 'px';
  })
  .on('mouseleave', (e, d) => {
    applyFilter();
    d3.select(e.currentTarget).select('image')
      .transition().duration(200)
      .attr('x', -d.r).attr('y', -d.r)
      .attr('width', d.r * 2).attr('height', d.r * 2);
    d3.select(e.currentTarget).selectAll('circle')
      .transition().duration(200).attr('r', d.r);
    tooltip.classList.remove('visible');
  })
  .on('click', (e, d) => {
    e.stopPropagation();
    document.getElementById('modal-img').src = d.src_url;
    document.getElementById('modal-date').textContent = d.date || '';
    document.getElementById('modal-label').textContent = d.title;
    document.getElementById('modal-tags').innerHTML = (d.tags || []).map(t => `<span class="modal-tag">${t}</span>`).join('');
    document.getElementById('modal').classList.add('visible');
  });

  svg.on('click', () => closeModal());

  // ─── TICK ──────────────────────────────────────────────────────────────────
  sim.on('tick', () => {
    link
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // ─── INTRO ANIMATION ───────────────────────────────────────────────────────
  node.selectAll('circle').attr('r', 0).attr('opacity', 0);
  node.selectAll('image').attr('opacity', 0);
  node.selectAll('text').attr('opacity', 0);
  link.attr('opacity', 0).attr('stroke-dasharray', function() {
    const len = this.getTotalLength ? this.getTotalLength() : 80;
    return `${len} ${len}`;
  }).attr('stroke-dashoffset', function() {
    const len = this.getTotalLength ? this.getTotalLength() : 80;
    return len;
  });

  const HOLD_MS = 1500;
  const EXIT_MS = 800;
  const introEl = document.getElementById('intro-overlay');

  setTimeout(() => {
    introEl.classList.add('exiting');
    setTimeout(() => introEl.classList.add('done'), EXIT_MS);

    node.selectAll('circle')
      .transition()
      .delay((d, i) => 200 + i * 70)
      .duration(500)
      .ease(d3.easeBackOut.overshoot(1.4))
      .attr('r', d => d.r)
      .attr('opacity', 1);

    node.selectAll('image')
      .transition()
      .delay((d, i) => 200 + i * 70)
      .duration(500)
      .ease(d3.easeBackOut.overshoot(1.4))
      .attr('opacity', 1);

    node.selectAll('text')
      .transition()
      .delay((d, i) => 400 + i * 70)
      .duration(350)
      .ease(d3.easeCubicOut)
      .attr('opacity', 0.7);

    link
      .transition()
      .delay((d, i) => 700 + i * 25)
      .duration(600)
      .ease(d3.easeCubicOut)
      .attr('stroke-dashoffset', 0)
      .attr('opacity', d => 0.2 + d.strength * 0.1)
      .on('end', function() {
        d3.select(this).attr('stroke-dasharray', null).attr('stroke-dashoffset', null);
      });
  }, HOLD_MS);

  // ─── RESIZE ────────────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    svg.attr('width', window.innerWidth).attr('height', window.innerHeight);
    sim.force('center', d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2));
    sim.alpha(0.2).restart();
  });
}

initGraph();
</script>
</body>
</html>
